kind = "web"
previewPath = "/"
title = "Unisphere"
version = "1.0.0"
id = "artifacts/unisphere"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21853

[services.development]
run = "pnpm --filter @workspace/unisphere run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/unisphere", "run", "build" ]
publicDir = "artifacts/unisphere/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21853"
BASE_PATH = "/"
